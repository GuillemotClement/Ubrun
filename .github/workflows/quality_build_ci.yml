name: Quality & Build

on:
  pull_request:
    branches:
      - dev
      - main

jobs:
  quality_build:
    name: ESLint, Prettier & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependancies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Check Prettier
        run: npm run format:check

      - name: Build project
        run: npm run build
